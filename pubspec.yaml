name: giftory
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: LINESeedSans
      fonts:
        - asset: assets/fonts/LINESeedSans_Rg.ttf
          weight: 400
        - asset: assets/fonts/LINESeedSans_Bd.ttf
          weight: 700

  assets:
    - assets/images/